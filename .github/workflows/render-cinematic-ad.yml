name: Render Cinematic Ad

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "cinematic_ad_jobs.id (UUID) to render"
        required: true
        type: string

concurrency:
  group: cinematic-render-${{ github.event.inputs.job_id }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      FUNCTIONS_BASE_URL: ${{ secrets.SUPABASE_URL }}/functions/v1
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RENDER_WORKER_SECRET: ${{ secrets.RENDER_WORKER_SECRET }}
      JOB_ID: ${{ inputs.job_id }}
      RENDER_WORKER_ID: gh-actions-${{ github.run_id }}
      EXPECTED_SUPABASE_HOST: nojvgfbcjgipjxpfatmm.supabase.co

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ffmpeg + chromium deps
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser fonts-liberation libnss3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Preflight env check
        shell: bash
        run: |
          set -euo pipefail

          echo "JOB_ID=${JOB_ID}"

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Error: GitHub repository secret missing: SUPABASE_URL"
            exit 1
          fi

          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Error: GitHub repository secret missing: SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          if [ -z "${RENDER_WORKER_SECRET:-}" ]; then
            echo "Error: GitHub repository secret missing: RENDER_WORKER_SECRET"
            exit 1
          fi

          if [ -z "${JOB_ID:-}" ]; then
            echo "Error: workflow_dispatch input missing: job_id"
            exit 1
          fi

          if ! echo "${JOB_ID}" | grep -Eiq '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "Full UUID required. Do not use shortened display id."
            echo "got: ${JOB_ID}"
            exit 1
          fi

          SUPABASE_HOST=$(node -e 'console.log(new URL(process.env.SUPABASE_URL).host)')
          echo "SUPABASE_URL host=${SUPABASE_HOST}"

          if [ "${SUPABASE_HOST}" != "${EXPECTED_SUPABASE_HOST}" ]; then
            echo "Error: SUPABASE_URL must point to ${EXPECTED_SUPABASE_HOST}"
            exit 1
          fi

          echo "SUPABASE_SERVICE_ROLE_KEY exists"
          echo "RENDER_WORKER_SECRET exists"
          echo "FUNCTIONS_BASE_URL=${FUNCTIONS_BASE_URL}"
          echo "Preflight env check OK"

      - name: Render MP4
        shell: bash
        run: |
          set -euo pipefail
          bun remotion/scripts/render-cinematic-ad.mjs --job="${JOB_ID}"
