name: Render Cinematic Ad

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "cinematic_ad_jobs.id (UUID) to render"
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      FUNCTIONS_BASE_URL: ${{ secrets.SUPABASE_URL }}/functions/v1
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RENDER_WORKER_SECRET: ${{ secrets.RENDER_WORKER_SECRET }}
      JOB_ID: ${{ inputs.job_id }}
      RENDER_WORKER_ID: gh-actions-${{ github.run_id }}
      EXPECTED_SUPABASE_HOST: nojvgfbcjgipjxpfatmm.supabase.co
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg + chromium deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser fonts-liberation libnss3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Preflight env check
        run: |
          echo "JOB_ID=${JOB_ID}"
          MISSING=0
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::error::GitHub repository secret missing: SUPABASE_URL"
            MISSING=1
          else
            echo "SUPABASE_URL host=$(node -e \"console.log(new URL(process.env.SUPABASE_URL).host)\")"
            if [ "$(node -e \"console.log(new URL(process.env.SUPABASE_URL).host)\")" != "${EXPECTED_SUPABASE_HOST}" ]; then
              echo "::error::SUPABASE_URL must point to ${EXPECTED_SUPABASE_HOST}"
              MISSING=1
            fi
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::GitHub repository secret missing: SUPABASE_SERVICE_ROLE_KEY"
            MISSING=1
          else
            echo "SUPABASE_SERVICE_ROLE_KEY exists"
          fi
          if [ -z "${RENDER_WORKER_SECRET:-}" ]; then
            echo "::error::GitHub repository secret missing: RENDER_WORKER_SECRET"
            MISSING=1
          else
            echo "RENDER_WORKER_SECRET exists"
          fi
          if [ -z "${JOB_ID:-}" ]; then
            echo "::error::workflow_dispatch input missing: job_id"
            MISSING=1
          fi
          if [ "$MISSING" -ne 0 ]; then exit 1; fi
          echo "FUNCTIONS_BASE_URL=${FUNCTIONS_BASE_URL}"

      - name: Render MP4
        run: bun remotion/scripts/render-cinematic-ad.mjs --job=${{ inputs.job_id }}