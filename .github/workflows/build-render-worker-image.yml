name: Build Render Worker Image (GHCR)

# Builds render-worker/Dockerfile and pushes to
# ghcr.io/jasperdiks1979-star/getpawsy-render-worker
#
# Tags pushed per build:
#   - latest                (always, on main)
#   - sha-<short-commit>    (immutable, for rollback)
#   - <YYYYMMDD-HHmm>       (immutable, human readable)
#
# The Render "Deploy an Existing Image" service points at :latest
# (or a pinned sha- tag) and pulls the new digest on redeploy. No Render
# build pipeline minutes are consumed — only GitHub Actions minutes,
# which are a separate quota.
#
# Resync nudge: 2026-06-22T09:05:04Z — force GitHub Actions to pick up
# the latest render-worker/start.mjs banner + uncaughtException handlers
# after a Lovable→GitHub sync delay. Safe no-op for the build itself.
#
# Permissions: this workflow uses the built-in GITHUB_TOKEN with
# `packages: write` to push to GHCR; no PAT or extra secret needed.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "render-worker/**"
      - "remotion/**"
      - ".github/workflows/build-render-worker-image.yml"
      - ".github/workflows/render-worker-deploy.yml"
      - "render.yaml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you rebuilding the worker image?"
        required: false
        default: "manual rebuild"

concurrency:
  group: build-render-worker-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/jasperdiks1979-star/getpawsy-render-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute build tags
        id: tags
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          ts="$(date -u +%Y%m%d-%H%M)"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:sha-${short_sha}"
            echo "${IMAGE}:${ts}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: render-worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=getpawsy-render-worker
            org.opencontainers.image.description=GetPawsy cinematic render worker (ffmpeg + remotion + supabase poller)

      - name: Summary
        run: |
          {
            echo "### Render worker image pushed ✅"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${IMAGE}:latest"
            echo "${IMAGE}:sha-${{ steps.tags.outputs.short_sha }}"
            echo '```'
            echo ""
            echo "Next step: on Render, the **Existing Image** service for"
            echo "\`${IMAGE}\` will pull the new digest on its next deploy."
            echo "Trigger via Render dashboard → *Manual Deploy → Deploy latest reference*,"
            echo "or via the Deploy Hook saved as \`RENDER_WORKER_DEPLOY_HOOK_URL\`."
          } >> "$GITHUB_STEP_SUMMARY"