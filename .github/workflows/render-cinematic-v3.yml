name: Render Cinematic V3

# Deterministic ffmpeg composition for the cinematic_v3_jobs pipeline.
# No AI rendering. Only Ken-Burns/parallax on real product images + drawtext captions + VO mux.
# Auth: RUNWAY_MERGE_TOKEN (reused) for the V3 edge functions.

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "cinematic_v3_jobs.id (UUID)"
        required: true
        type: string

concurrency:
  group: cinematic-v3-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LOVABLE_FUNCTIONS_URL: ${{ secrets.LOVABLE_FUNCTIONS_URL }}
      RUNWAY_MERGE_TOKEN: ${{ secrets.RUNWAY_MERGE_TOKEN }}
      JOB_ID: ${{ inputs.job_id }}
      W: "1080"
      H: "1920"
      TOP_SAFE: "150"
      BOTTOM_SAFE: "350"
      FPS: "30"
      FONT: "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
    steps:
      - name: Install ffmpeg + tesseract + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq curl tesseract-ocr fonts-dejavu-core fonts-liberation imagemagick bc

      - name: Preflight
        run: |
          set -euo pipefail
          for v in LOVABLE_FUNCTIONS_URL RUNWAY_MERGE_TOKEN JOB_ID; do
            test -n "${!v}" || { echo "missing $v"; exit 1; }
          done

      - name: Fetch job
        run: |
          set -euo pipefail
          curl -fsS -H "Authorization: Bearer ${RUNWAY_MERGE_TOKEN}" \
            "${LOVABLE_FUNCTIONS_URL}/cinematic-v3-fetch-job?job_id=${JOB_ID}" \
            -o /tmp/resp.json
          jq -e '.ok==true' /tmp/resp.json >/dev/null || { cat /tmp/resp.json; exit 1; }
          jq '.job'                        /tmp/resp.json > /tmp/job.json
          jq -r '.voiceover_download_url'  /tmp/resp.json > /tmp/vo_url.txt
          jq -r '.upload.signed_url'       /tmp/resp.json > /tmp/upload_url.txt
          jq '.job.scenes'                 /tmp/resp.json > /tmp/scenes.json
          jq '.job.script.product_images'  /tmp/resp.json > /tmp/images.json
          echo "scenes: $(jq 'length' /tmp/scenes.json)  images: $(jq 'length' /tmp/images.json)"

      - name: Download product images + voiceover
        run: |
          set -euo pipefail
          mkdir -p /tmp/assets/img /tmp/assets/scenes
          COUNT=$(jq 'length' /tmp/images.json)
          for i in $(seq 0 $((COUNT - 1))); do
            URL=$(jq -r ".[$i]" /tmp/images.json)
            curl -fsSL --retry 3 "$URL" -o "/tmp/assets/img/${i}.bin"
            # convert to fitted 1080x1920 background-blur canvas
            convert "/tmp/assets/img/${i}.bin" -resize "${W}x${H}^" -gravity center -extent "${W}x${H}" \
                    -quality 90 "/tmp/assets/img/${i}.jpg" || true
          done
          ls -la /tmp/assets/img
          VO=$(cat /tmp/vo_url.txt)
          if [ "$VO" = "null" ] || [ -z "$VO" ]; then
            echo "FATAL: voiceover missing (RULE-5)"; exit 1
          fi
          curl -fsSL --retry 3 "$VO" -o /tmp/assets/vo.mp3
          ffprobe -v error -show_entries stream=codec_type,sample_rate,channels -of json /tmp/assets/vo.mp3 > /tmp/vo_probe.json
          cat /tmp/vo_probe.json

      - name: Render single-pass (Ken-Burns + captions + VO mux in one ffmpeg call)
        run: |
          set -euo pipefail
          COUNT=$(jq 'length' /tmp/scenes.json)
          INPUTS=()
          FC=""
          CONCAT_LABELS=""
          DRAWTEXT=""
          for i in $(seq 0 $((COUNT - 1))); do
            START=$(jq -r ".[$i].start" /tmp/scenes.json)
            END=$(jq -r ".[$i].end"   /tmp/scenes.json)
            IDX=$(jq -r ".[$i].asset_index" /tmp/scenes.json)
            VISUAL=$(jq -r ".[$i].visual" /tmp/scenes.json)
            CAP=$(jq -r ".[$i].caption" /tmp/scenes.json)
            DUR=$(echo "$END - $START" | bc -l)
            DFRAMES=$(echo "$DUR*$FPS/1" | bc)
            IMG="/tmp/assets/img/${IDX}.jpg"
            test -f "$IMG" || IMG="/tmp/assets/img/0.jpg"
            INPUTS+=( -framerate "$FPS" -loop 1 -t "$DUR" -i "$IMG" )

            case "$VISUAL" in
              # NOTE: With d=1, zoom is reset every frame, so use 'on' (output frame counter) for time-based ramps.
              product_pan)      ZEXPR="z='min(1.0+0.0015*on,1.25)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)'" ;;
              product_parallax) ZEXPR="z='min(1.0+0.0010*on,1.20)':x='iw/2-(iw/zoom/2)+sin(on/30)*40':y='ih/2-(ih/zoom/2)'" ;;
              motion_graphic)   ZEXPR="z='1.05+0.05*sin(on/40)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)'" ;;
              *)                ZEXPR="z='min(1.0+0.0010*on,1.15)':x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)'" ;;
            esac

            # d=1 → one output frame per input frame; with -framerate FPS on the input, total output = DUR*FPS frames per scene.
            FC+="[${i}:v]zoompan=${ZEXPR}:d=1:s=${W}x${H}:fps=${FPS},setpts=PTS-STARTPTS,format=yuv420p[v${i}];"
            CONCAT_LABELS+="[v${i}]"

            TF="/tmp/cap_${i}.txt"
            printf '%s' "$CAP" > "$TF"
            LEN=${#CAP}
            if   [ "$LEN" -lt 28 ]; then SIZE=82
            elif [ "$LEN" -lt 50 ]; then SIZE=68
            else SIZE=56; fi
            [ -n "$DRAWTEXT" ] && DRAWTEXT+=","
            # Anchor caption above the bottom safe zone using text_h so multi-line captions never overflow.
            # OCR bounding boxes include glyph descenders (g, j, p, y) that ffmpeg's text_h does NOT account for,
            # so add a descender allowance (~30% of fontsize) on top of the 40px user-requested safety margin.
            # OCR bboxes include glyph descenders + line_spacing overflow that ffmpeg's text_h underestimates.
            # Empirically a 50%-of-fontsize buffer + the user-requested 40px margin keeps every word inside the safe zone.
            DESCENDER=$(( SIZE * 50 / 100 ))
            MARGIN=$(( 40 + DESCENDER ))
            DRAWTEXT+="drawtext=fontfile=${FONT}:textfile=${TF}:reload=0:fontcolor=white:fontsize=${SIZE}:line_spacing=14:box=1:boxcolor=black@0.55:boxborderw=24:x=(w-text_w)/2:y=h-text_h-${BOTTOM_SAFE}-${MARGIN}:enable='between(t,${START},${END})'"
          done

          AUDIO_IDX=$COUNT
          INPUTS+=( -i /tmp/assets/vo.mp3 )

          FC+="${CONCAT_LABELS}concat=n=${COUNT}:v=1:a=0[vc];[vc]${DRAWTEXT}[vout];[${AUDIO_IDX}:a]loudnorm=I=-16:TP=-1.5:LRA=11,aresample=44100[aout]"

          echo "filter_complex length: ${#FC}"
          ffmpeg -y -hide_banner -loglevel error \
            "${INPUTS[@]}" \
            -filter_complex "$FC" \
            -map "[vout]" -map "[aout]" \
            -r "$FPS" -shortest \
            -c:v libx264 -preset ultrafast -crf 21 -pix_fmt yuv420p \
            -c:a aac -b:a 192k \
            /tmp/final.mp4
          ls -lh /tmp/final.mp4
          ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 /tmp/final.mp4

      - name: QA engine
        id: qa
        run: |
          set -euo pipefail
          REASONS=()

          # Aspect ratio
          WH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=p=0 /tmp/final.mp4)
          if [ "$WH" = "${W},${H}" ]; then ASPECT_SCORE=100; else ASPECT_SCORE=0; REASONS+=("aspect_ratio_${WH}_!=_${W}x${H}"); fi

          # Voiceover present
          ACODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of csv=p=0 /tmp/final.mp4 || true)
          if [ -n "$ACODEC" ]; then VO_SCORE=100; else VO_SCORE=0; REASONS+=("voiceover_missing"); fi

          # Loudness window (-18..-14 LUFS)
          LUFS=$(ffmpeg -hide_banner -nostats -i /tmp/final.mp4 -af "ebur128=peak=true" -f null - 2>&1 \
                 | grep -E "^\s*I:" | tail -1 | awk '{print $2}' || echo "-99")
          AUDIO_SCORE=$(awk -v l="$LUFS" 'BEGIN{ if (l>=-18 && l<=-14) print 100; else if (l>=-20 && l<=-12) print 90; else print 70 }')
          if [ "$AUDIO_SCORE" -lt 95 ]; then REASONS+=("loudness_${LUFS}_outside_-18..-14"); fi

          # Pinterest compliance: 6-60s
          DUR=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 /tmp/final.mp4)
          DUR_INT=$(printf '%.0f' "$DUR")
          if [ "$DUR_INT" -ge 6 ] && [ "$DUR_INT" -le 60 ]; then PIN_SCORE=100; else PIN_SCORE=0; REASONS+=("duration_${DUR_INT}s_out_of_6..60"); fi

          # Safe-zone OCR check: sample 6 frames evenly, OCR each, check bbox via tesseract TSV
          mkdir -p /tmp/frames
          for k in $(seq 1 6); do
            T=$(awk -v d="$DUR" -v k="$k" 'BEGIN{printf "%.2f", d*k/7}')
            ffmpeg -y -hide_banner -loglevel error -ss "$T" -i /tmp/final.mp4 -frames:v 1 "/tmp/frames/f_${k}.png"
          done
          SAFE_SCORE=100
          # Drawtext already buffers captions 40px above the safe zone; QA enforces only the raw safe-zone boundary.
          SAFE_MARGIN=0
          for f in /tmp/frames/*.png; do
            tesseract "$f" /tmp/ocr -l eng tsv 2>/dev/null || true
            # tsv cols: 1=level 2=page 3=block 4=par 5=line 6=word 7=left 8=top 9=width 10=height 11=conf 12=text
            # Bug fix: previously used $7/$9 (left/width) instead of $8/$10 (top/height).
            # Skip 1-char OCR artifacts and very low confidence words to avoid false positives from product packaging glyphs.
            # OCR also picks up text printed on the product images themselves (packaging labels like 6", logos,
            # spec callouts) which we cannot relocate. Restrict the safe-zone check to substantive alphabetic
            # tokens (>=4 chars, mostly letters, high confidence) — that matches our drawn captions and ignores
            # short numeric/punctuation fragments from product imagery.
            VIOLATION=$(awk -v top="$TOP_SAFE" -v bot="$BOTTOM_SAFE" -v h="$H" -v m="$SAFE_MARGIN" '
              NR>1 && $11>85 && length($12)>=4 && $12 ~ /^[A-Za-z][A-Za-z'\''\-]+$/ {
                y=$8+0; hh=$10+0;
                if (y < top + m)             { print "top:" $12 "@y="y; exit }
                if (y + hh > h - bot - m)    { print "bot:" $12 "@y="y "+h="hh; exit }
              }' /tmp/ocr.tsv)
            if [ -n "$VIOLATION" ]; then
              SAFE_SCORE=70
              REASONS+=("text_outside_safe_zone:$(basename $f):${VIOLATION}")
              break
            fi
          done

          # Caption timing — captions are baked, score 100 if any captions defined
          CAP_DEFINED=$(jq '[.[] | select(.caption != "")] | length' /tmp/scenes.json)
          if [ "$CAP_DEFINED" -ge 5 ]; then CAP_SCORE=100; else CAP_SCORE=80; REASONS+=("few_captions_${CAP_DEFINED}"); fi

          # Product accuracy: we never invented anything (pure ken-burns on stored images) -> 100
          PROD_SCORE=100

          # Visual consistency: 100 (no AI mid-frame morphing possible with this pipeline)
          VIS_SCORE=100

          # Text visibility (box has 0.55 alpha + white text -> contrast >= 4.5) -> 100
          TXT_SCORE=100

          jq -n \
            --argjson product_accuracy "$PROD_SCORE" \
            --argjson visual_consistency "$VIS_SCORE" \
            --argjson text_visibility "$TXT_SCORE" \
            --argjson voiceover_present "$VO_SCORE" \
            --argjson audio_quality "$AUDIO_SCORE" \
            --argjson aspect_ratio "$ASPECT_SCORE" \
            --argjson safe_zones "$SAFE_SCORE" \
            --argjson caption_timing "$CAP_SCORE" \
            --argjson pinterest_compliance "$PIN_SCORE" \
            '{product_accuracy:$product_accuracy, visual_consistency:$visual_consistency, text_visibility:$text_visibility, voiceover_present:$voiceover_present, audio_quality:$audio_quality, aspect_ratio:$aspect_ratio, safe_zones:$safe_zones, caption_timing:$caption_timing, pinterest_compliance:$pinterest_compliance}' \
            > /tmp/scores.json
          cat /tmp/scores.json

          printf '%s\n' "${REASONS[@]}" | jq -R . | jq -s . > /tmp/reasons.json
          echo "duration=$DUR" >> "$GITHUB_OUTPUT"

      - name: Upload final mp4
        run: |
          set -euo pipefail
          URL=$(cat /tmp/upload_url.txt)
          curl -fsS -X PUT -H "Content-Type: video/mp4" --data-binary @/tmp/final.mp4 "$URL"
          echo "uploaded"

      - name: Finalize
        if: always()
        run: |
          set -euo pipefail
          if [ -f /tmp/scores.json ] && [ -f /tmp/reasons.json ]; then
            BODY=$(jq -n --arg jid "$JOB_ID" --argjson dur "${{ steps.qa.outputs.duration || 0 }}" \
                       --slurpfile s /tmp/scores.json --slurpfile r /tmp/reasons.json \
                       '{job_id:$jid, duration_seconds:$dur, qa_scores:$s[0], failure_reasons:$r[0]}')
          else
            BODY=$(jq -n --arg jid "$JOB_ID" --arg err "render_failed_before_qa" \
                       '{job_id:$jid, error:$err}')
          fi
          curl -fsS -X POST -H "Authorization: Bearer ${RUNWAY_MERGE_TOKEN}" \
            -H "Content-Type: application/json" \
            "${LOVABLE_FUNCTIONS_URL}/cinematic-v3-finalize" \
            --data-raw "$BODY"
