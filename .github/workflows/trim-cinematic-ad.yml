name: Trim Cinematic Ad MP4

# Emergency server-side ffmpeg clamp for oversize cinematic renders.
# Dispatched by cinematic-ad-render-webhook when output_duration_seconds > HARD_MAX.
#
# Inputs:
#   job_id          ‚Äî cinematic_ad_jobs.id (UUID)
#   mp4_url         ‚Äî public URL of the oversize MP4
#   target_seconds  ‚Äî hard cap (default "15")
#   render_token    ‚Äî token to pass back to the webhook
#
# Flow:
#   1. download MP4
#   2. ffmpeg trim to target_seconds (re-encode for keyframe safety, keep audio)
#   3. upload to storage as <job_id>/output-trimmed.mp4 (cinematic-ads bucket)
#   4. POST callback to cinematic-ad-render-webhook with status=uploaded,
#      duration=<trimmed>, mp4_url=<new>, duration_auto_trimmed=true,
#      original_duration=<orig>, trim_ffmpeg_exit_code=<code>

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "cinematic_ad_jobs.id (UUID)"
        required: true
        type: string
      mp4_url:
        description: "Oversize MP4 public URL"
        required: true
        type: string
      target_seconds:
        description: "Hard duration cap (seconds)"
        required: false
        type: string
        default: "15"
      render_token:
        description: "render_token of the job"
        required: false
        type: string
        default: ""

concurrency:
  group: cinematic-trim-${{ github.event.inputs.job_id }}
  cancel-in-progress: false

jobs:
  trim:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RENDER_WORKER_SECRET: ${{ secrets.RENDER_WORKER_SECRET }}
      JOB_ID:        ${{ inputs.job_id }}
      MP4_URL:       ${{ inputs.mp4_url }}
      TARGET_SEC:    ${{ inputs.target_seconds }}
      RENDER_TOKEN:  ${{ inputs.render_token }}
      WORKER_ID:     gh-trim-${{ github.run_id }}
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg jq curl

      - name: Preflight
        run: |
          set -euo pipefail
          # MP4_URL is optional ‚Äî we always re-resolve via DB lookup and only use
          # the workflow-input URL if it actually returns 200.
          for v in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY JOB_ID; do
            test -n "${!v}" || { echo "missing $v"; exit 1; }
          done
          if [ -z "${RENDER_WORKER_SECRET:-}" ]; then
            echo "Error: required GitHub Actions repository secret missing: RENDER_WORKER_SECRET"
            echo "Add it under repo Settings ‚Üí Secrets and variables ‚Üí Actions ‚Üí New repository secret"
            exit 1
          fi
          # Strip trailing slashes from SUPABASE_URL to prevent `‚Ä¶supabase.co//storage/‚Ä¶`
          # which iPhone Safari sometimes refuses to play inline.
          SUPABASE_URL="${SUPABASE_URL%/}"
          SUPABASE_URL="${SUPABASE_URL%/}"
          echo "SUPABASE_URL=${SUPABASE_URL}" >> "$GITHUB_ENV"
          echo "TARGET_SEC=${TARGET_SEC}"
          echo "JOB_ID=${JOB_ID}"

      - name: Resolve source MP4 URL
        id: resolve
        run: |
          set -euo pipefail
          safe_prefix() { echo "$1" | cut -c1-80; }

          LOOKUP_URL="${SUPABASE_URL}/rest/v1/cinematic_ad_jobs?id=eq.${JOB_ID}&select=output_mp4_url,output_duration_seconds"
          DB_RESP=$(curl -fsS \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${LOOKUP_URL}")
          DB_URL=$(echo "${DB_RESP}" | jq -r '.[0].output_mp4_url // ""')
          DB_DUR=$(echo "${DB_RESP}" | jq -r '.[0].output_duration_seconds // 0')
          echo "[resolve] db_url_prefix=$(safe_prefix "${DB_URL}") db_duration=${DB_DUR}"

          CHOSEN=""
          if [ -n "${MP4_URL:-}" ]; then
            INPUT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --retry 2 -I "${MP4_URL}")
            echo "[resolve] input_url_prefix=$(safe_prefix "${MP4_URL}") http=${INPUT_STATUS}"
            if [ "${INPUT_STATUS}" = "200" ]; then
              CHOSEN="${MP4_URL}"
            else
              echo "[resolve] input URL not reachable (HTTP ${INPUT_STATUS}) ‚Äî falling back to DB output_mp4_url"
            fi
          fi

          if [ -z "${CHOSEN}" ] && [ -n "${DB_URL}" ]; then
            DB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --retry 2 -I "${DB_URL}")
            echo "[resolve] db_url http=${DB_STATUS}"
            if [ "${DB_STATUS}" = "200" ]; then
              CHOSEN="${DB_URL}"
            else
              echo "[resolve] DB URL also unreachable (HTTP ${DB_STATUS})" | tee /tmp/last_err
            fi
          fi

          if [ -z "${CHOSEN}" ]; then
            echo "no_reachable_source_mp4 for job ${JOB_ID}" | tee /tmp/last_err
            exit 22
          fi

          echo "SOURCE_URL=${CHOSEN}" >> "$GITHUB_ENV"
          echo "DB_DURATION=${DB_DUR}" >> "$GITHUB_ENV"

      - name: Skip trim if already within 60s cap
        id: skipcheck
        run: |
          set -euo pipefail
          DUR_INT=$(printf "%.0f" "${DB_DURATION:-0}")
          if [ "${DUR_INT}" -gt 0 ] && [ "${DUR_INT}" -le 60 ]; then
            echo "[skip] duration=${DB_DURATION}s <= 60s ‚Äî posting render_complete callback, no trim"
            PAYLOAD=$(jq -n \
              --arg job_id "${JOB_ID}" \
              --arg url    "${SOURCE_URL}" \
              --arg tok    "${RENDER_TOKEN}" \
              --arg wid    "${WORKER_ID}" \
              --argjson dur ${DB_DURATION} \
              '{job_id:$job_id, status:"uploaded", event:"auto_trim_skipped_within_cap",
                mp4_url:$url, duration:$dur, render_token:$tok, worker_id:$wid,
                duration_auto_trimmed:true, original_duration_seconds:$dur,
                trim_ffmpeg_exit_code:0, auto_approve:true, black_bars:false}')
            curl -fsS -X POST "${SUPABASE_URL}/functions/v1/cinematic-ad-render-webhook" \
              -H "Content-Type: application/json" \
              -H "x-render-secret: ${RENDER_WORKER_SECRET}" \
              --data "$PAYLOAD"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Download original
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          safe_prefix() { echo "$1" | cut -c1-80; }
          STATUS=$(curl -s -o /tmp/in.mp4 -w "%{http_code}" -L --retry 3 "${SOURCE_URL}")
          echo "[download] url_prefix=$(safe_prefix "${SOURCE_URL}") http=${STATUS}"
          if [ "${STATUS}" != "200" ]; then
            echo "download_failed http=${STATUS}" | tee /tmp/last_err
            exit 22
          fi
          ls -lh /tmp/in.mp4

      - name: Probe original duration
        id: probe
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          ORIG=$(ffprobe -v error -show_entries format=duration -of csv=p=0 /tmp/in.mp4 | awk '{printf "%.2f", $1}')
          echo "orig=${ORIG}" >> "$GITHUB_OUTPUT"
          echo "[trim] original_duration=${ORIG}"

      - name: ffmpeg trim
        id: trim
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set +e
          # Re-encode video to guarantee a clean keyframe at t=TARGET_SEC; keep audio.
          ffmpeg -y -hide_banner -loglevel error \
            -i /tmp/in.mp4 \
            -t "${TARGET_SEC}" \
            -c:v libx264 -preset veryfast -crf 20 -pix_fmt yuv420p \
            -c:a aac -b:a 128k -ac 2 -ar 44100 \
            -movflags +faststart \
            /tmp/out.mp4 2> /tmp/ffmpeg.err
          EC=$?
          echo "exit_code=${EC}" >> "$GITHUB_OUTPUT"
          echo "[trim] ffmpeg_exit_code=${EC}"
          set -e
          if [ "${EC}" != "0" ]; then
            echo "ffmpeg_exit=${EC}: $(tail -n 1 /tmp/ffmpeg.err 2>/dev/null || true)" | tee /tmp/last_err
            exit "${EC}"
          fi
          ls -lh /tmp/out.mp4
          TRIM=$(ffprobe -v error -show_entries format=duration -of csv=p=0 /tmp/out.mp4 | awk '{printf "%.2f", $1}')
          echo "trimmed=${TRIM}" >> "$GITHUB_OUTPUT"
          echo "[trim] trimmed_duration=${TRIM}"

      - name: Upload trimmed MP4 to storage
        id: upload
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          PATH_KEY="${JOB_ID}/output-trimmed.mp4"
          UPLOAD_URL="${SUPABASE_URL}/storage/v1/object/cinematic-ads/${PATH_KEY}"
          # Use upsert via x-upsert true
          HTTP=$(curl -s -o /tmp/upload.json -w "%{http_code}" -X POST "${UPLOAD_URL}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: video/mp4" \
            -H "Cache-Control: public, max-age=31536000" \
            -H "x-upsert: true" \
            --data-binary @/tmp/out.mp4)
          echo "upload http=${HTTP}"
          cat /tmp/upload.json || true
          test "${HTTP}" = "200" -o "${HTTP}" = "201" || exit 1
          PUB_URL="${SUPABASE_URL}/storage/v1/object/public/cinematic-ads/${PATH_KEY}"
          echo "url=${PUB_URL}" >> "$GITHUB_OUTPUT"
          echo "[trim] trimmed_url=${PUB_URL}"

      - name: Probe trimmed metadata
        id: meta
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          SIZE=$(stat -c%s /tmp/out.mp4)
          WH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width,height -of csv=p=0 /tmp/out.mp4)
          W=$(echo "$WH" | cut -d, -f1)
          H=$(echo "$WH" | cut -d, -f2)
          echo "size=${SIZE}"   >> "$GITHUB_OUTPUT"
          echo "width=${W}"     >> "$GITHUB_OUTPUT"
          echo "height=${H}"    >> "$GITHUB_OUTPUT"
          echo "[trim] trimmed_size=${SIZE} width=${W} height=${H}"

      - name: Callback to render webhook
        if: steps.skipcheck.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg job_id "${JOB_ID}" \
            --arg url    "${{ steps.upload.outputs.url }}" \
            --arg tok    "${RENDER_TOKEN}" \
            --arg wid    "${WORKER_ID}" \
            --argjson dur $(echo "${{ steps.trim.outputs.trimmed }}" | awk '{printf "%s", $1}') \
            --argjson orig $(echo "${{ steps.probe.outputs.orig }}" | awk '{printf "%s", $1}') \
            --argjson ec   ${{ steps.trim.outputs.exit_code }} \
            --argjson size ${{ steps.meta.outputs.size }} \
            --argjson w    ${{ steps.meta.outputs.width }} \
            --argjson h    ${{ steps.meta.outputs.height }} \
            '{job_id:$job_id, status:"uploaded", event:"auto_trim_complete",
              mp4_url:$url, duration:$dur, render_token:$tok, worker_id:$wid,
              duration_auto_trimmed:true, original_duration_seconds:$orig,
              trim_ffmpeg_exit_code:$ec, auto_approve:true,
              file_size:$size, width:$w, height:$h, black_bars:false}')
          echo "$PAYLOAD"
          curl -fsS -X POST "${SUPABASE_URL}/functions/v1/cinematic-ad-render-webhook" \
            -H "Content-Type: application/json" \
            -H "x-render-secret: ${RENDER_WORKER_SECRET}" \
            --data "$PAYLOAD"

      - name: Failure callback
        if: failure()
        run: |
          ERR_LINE=$(tail -n 1 /tmp/last_err 2>/dev/null || echo "see GH run ${{ github.run_id }}")
          EC_VAL="${{ steps.trim.outputs.exit_code }}"
          if [ -z "${EC_VAL}" ]; then EC_VAL=22; fi
          PAYLOAD=$(jq -n \
            --arg job_id "${JOB_ID}" \
            --arg wid "${WORKER_ID}" \
            --arg err "${ERR_LINE}" \
            --argjson ec ${EC_VAL} \
            '{job_id:$job_id, status:"failed", event:"auto_trim_failed",
              error_message:$err, trim_ffmpeg_exit_code:$ec, worker_id:$wid}')
          curl -fsS -X POST "${SUPABASE_URL}/functions/v1/cinematic-ad-render-webhook" \
            -H "Content-Type: application/json" \
            -H "x-render-secret: ${RENDER_WORKER_SECRET}" \
            --data "$PAYLOAD" || true