name: Redeploy Render Worker

# Calls the Supabase edge function `render-worker-deploy`, which (a) POSTs the
# Render.com Deploy Hook stored as a Supabase secret and (b) logs the response,
# timestamp, commit SHA, and duration into `render_worker_deploys`. The admin
# dashboard (/admin/worker-recovery) reads that table to show the latest status.
#
# Setup (one-time):
#   1. In Render.com → worker service → Settings → Deploy Hook, copy the URL.
#   2. In Lovable Cloud → Edge Function Secrets, add:
#         RENDER_WORKER_DEPLOY_HOOK_URL   (the URL from step 1)
#         RENDER_WORKER_DEPLOY_SECRET     (any long random string)
#   3. In GitHub repo → Settings → Secrets and variables → Actions, add:
#         RENDER_WORKER_DEPLOY_SECRET     (same value as step 2)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you manually redeploying the worker?"
        required: false
        default: "manual redeploy"

concurrency:
  group: render-worker-deploy
  cancel-in-progress: false

jobs:
  trigger-deploy-hook:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger render-worker-deploy edge function
        env:
          DEPLOY_SECRET: ${{ secrets.RENDER_WORKER_DEPLOY_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          REASON: ${{ github.event.inputs.reason || github.event_name }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_SECRET" ]; then
            echo "::warning::RENDER_WORKER_DEPLOY_SECRET not set in GitHub Actions secrets. Skipping."
            exit 0
          fi
          payload=$(jq -n \
            --arg src "github-actions:$REASON" \
            --arg sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            '{trigger_source:$src, commit_sha:$sha, commit_message:$msg, actor:$actor}')
          echo "Calling edge function with payload:"
          echo "$payload"
          http_code=$(curl -sS -o /tmp/deploy.out -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: $DEPLOY_SECRET" \
            --data "$payload" \
            "https://nojvgfbcjgipjxpfatmm.supabase.co/functions/v1/render-worker-deploy")
          echo "HTTP $http_code"
          cat /tmp/deploy.out || true
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Render worker deploy returned $http_code"
            exit 1
          fi