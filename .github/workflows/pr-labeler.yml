name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

  size-label:
    name: PR Size Label
    runs-on: ubuntu-latest
    steps:
      - name: Label PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size:xs'
          xs_max_size: 10
          s_label: 'size:s'
          s_max_size: 100
          m_label: 'size:m'
          m_max_size: 500
          l_label: 'size:l'
          l_max_size: 1000
          xl_label: 'size:xl'
          fail_if_xl: false
          message_if_xl: >
            This PR is quite large! Consider breaking it down into smaller PRs for easier review.

  type-label:
    name: Conventional Commit Label
    runs-on: ubuntu-latest
    steps:
      - name: Label based on PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const labels = [];
            
            // Conventional commit type labels
            if (title.startsWith('feat')) labels.push('type:feature');
            if (title.startsWith('fix')) labels.push('type:bugfix');
            if (title.startsWith('docs')) labels.push('type:documentation');
            if (title.startsWith('style')) labels.push('type:style');
            if (title.startsWith('refactor')) labels.push('type:refactor');
            if (title.startsWith('perf')) labels.push('type:performance');
            if (title.startsWith('test')) labels.push('type:test');
            if (title.startsWith('build') || title.startsWith('ci')) labels.push('type:ci/cd');
            if (title.startsWith('chore')) labels.push('type:chore');
            if (title.startsWith('revert')) labels.push('type:revert');
            
            // Priority labels based on keywords
            if (title.includes('urgent') || title.includes('critical') || title.includes('hotfix')) {
              labels.push('priority:critical');
            }
            if (title.includes('security')) {
              labels.push('security');
            }
            if (title.includes('breaking')) {
              labels.push('breaking-change');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }
