name: Edge Function Type Contract

# Runs Deno type-checking + tests for the pinterest_pin_queue contract so
# backdrop_* fields can never be reintroduced into PinterestQueueInsert
# without breaking CI. See mem://infrastructure/pinterest-pin-queue-type-contract.

on:
  push:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/edge-function-types.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/edge-function-types.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-function-types:
    name: Pinterest queue type contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      # Run on every PR with a fresh, isolated DENO_DIR to guarantee no
      # cached modules from previous runs hide a regression. The directory
      # is unique per run so cache restores can never repopulate it.
      - name: Prepare clean Deno cache (fresh on every PR)
        run: |
          FRESH_DIR="${RUNNER_TEMP}/deno-cache-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "$FRESH_DIR"
          echo "DENO_DIR=$FRESH_DIR" >> "$GITHUB_ENV"
          echo "Using clean DENO_DIR=$FRESH_DIR"

      - name: Reload remote modules from origin (no cache)
        run: |
          deno cache --reload \
            supabase/functions/_shared/pinterest-queue-types.ts \
            supabase/functions/pinterest-viral-batch/index.ts \
            supabase/functions/pinterest-viral-batch/types_test.ts \
            supabase/functions/pinterest-viral-batch/sanitize_test.ts

      # Single source of truth — same script developers run locally via
      # `npm run edge:contract`. Keeps CI and local in lockstep so a green
      # local run guarantees a green CI run (and vice-versa).
      - name: Run edge:contract (deno check + tests + backdrop_* guard)
        run: npm run edge:contract