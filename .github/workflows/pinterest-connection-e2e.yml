name: Pinterest Connection E2E

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Nightly at 03:17 UTC — catches regressions even when no PRs land.
    - cron: '17 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pinterest-connection-consistency:
    name: OAuth / Connection Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RUN_E2E: '1'
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://nojvgfbcjgipjxpfatmm.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Pinterest connection consistency E2E
        run: bunx vitest run src/test/pinterest-connection-consistency.e2e.test.ts --reporter=verbose
