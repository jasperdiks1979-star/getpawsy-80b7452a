# Cloudflare Worker: getpawsy-gsc-recovery
# Real 410/301 responses for the exact 331-URL GSC soft-404 cohort.
#
# Route scoping is ONLY declared inside named environments so that
# `wrangler deploy --env staging` cannot inherit production routes,
# and `wrangler deploy --env production` cannot inherit anything else.
# The top level intentionally declares NO routes and NO name.

name = "getpawsy-gsc-recovery"
main = "src/worker.ts"
compatibility_date = "2026-07-01"
workers_dev = false

# Fill in before `wrangler deploy`.
account_id = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"

[observability]
enabled = true

# ── Staging (canary) ─────────────────────────────────────────────────────────
# Deploy:  wrangler deploy --env staging
# Bound ONLY to /c/* on the apex. Combined with exact-match in worker.ts, this
# limits the blast radius to the 16 confirmed /c/* cohort URLs — every other
# /c/* path passes through untouched.
[env.staging]
name = "getpawsy-gsc-recovery-staging"
workers_dev = false
routes = [
  { pattern = "getpawsy.pet/c/*", zone_name = "getpawsy.pet" },
]

# ── Production ───────────────────────────────────────────────────────────────
# Deploy:  wrangler deploy --env production
[env.production]
name = "getpawsy-gsc-recovery"
workers_dev = false
routes = [
  { pattern = "getpawsy.pet/*", zone_name = "getpawsy.pet" },
  { pattern = "www.getpawsy.pet/*", zone_name = "getpawsy.pet" },
]
