    <!-- Boot resilience: handles chunk load failures and version mismatches -->
    <script>
      window.__BOOT_OK__ = false;
      window.__BOOT_ERRORS__ = [];
      window.__BOOT_FATAL_ERRORS__ = [];

      // Benign errors that should NOT trigger crash overlay
      var BENIGN_PATTERNS = [
        'Importing a module script failed',
        'Failed to fetch dynamically imported module',
        'ResizeObserver loop',
        'ResizeObserver loop completed with undelivered notifications',
        'Load failed',
        'Loading chunk',
        'Loading CSS chunk',
        'NetworkError',
        'AbortError',
        'The operation was aborted',
        'Script error',
        'net::ERR_',
        'ChunkLoadError',
        'The user aborted a request',
        'cancelled',
        'TypeError: cancelled',
        'NotFoundError',
        'The object can not be found here',
        'removeChild',
      ];

      function isBenignError(msg) {
        if (!msg || typeof msg !== 'string') return false;
        var m = msg.toLowerCase();
        for (var i = 0; i < BENIGN_PATTERNS.length; i++) {
          if (m.indexOf(BENIGN_PATTERNS[i].toLowerCase()) !== -1) return true;
        }
        return false;
      }

      window.addEventListener('error', function(e) {
        window.__BOOT_ERRORS__.push({ type: 'error', msg: e.message, file: e.filename, line: e.lineno });
        if (!isBenignError(e.message)) {
          window.__BOOT_FATAL_ERRORS__.push({ type: 'error', msg: e.message, file: e.filename, line: e.lineno, ts: Date.now() });
        }
        console.warn('[BOOT] JS error:', e.message);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
        window.__BOOT_ERRORS__.push({ type: 'rejection', msg: msg });
        if (!isBenignError(msg)) {
          window.__BOOT_FATAL_ERRORS__.push({ type: 'rejection', msg: msg, ts: Date.now() });
        }
        console.warn('[BOOT] Unhandled rejection:', msg);
      });

      // ── UNIFIED RELOAD GUARD ──────────────────────────────────────
      // Single key used by ALL reload mechanisms (index.html, boot-diagnostics,
      // build-version-guard). Prevents cascading reloads.
      var RELOAD_GUARD_KEY = 'gp_reload_guard_v2';

      var CHUNK_FAIL_PATTERNS = [
        'importing a module script failed',
        'failed to fetch dynamically imported module',
        'loading chunk',
        'loading css chunk',
        'chunkloaderror',
      ];

      function isChunkFailure(msg) {
        if (!msg || typeof msg !== 'string') return false;
        var m = msg.toLowerCase();
        for (var i = 0; i < CHUNK_FAIL_PATTERNS.length; i++) {
          if (m.indexOf(CHUNK_FAIL_PATTERNS[i]) !== -1) return true;
        }
        return false;
      }

      // Returns how many reloads have been attempted this session
      function getReloadCount() {
        try { return parseInt(sessionStorage.getItem(RELOAD_GUARD_KEY) || '0', 10) || 0; } catch(_) { return 0; }
      }

      function doChunkReload() {
        var count = getReloadCount();
        if (count >= 1) {
          // Already reloaded once — show recovery UI, never reload again
          showChunkRecovery();
          return;
        }
        try { sessionStorage.setItem(RELOAD_GUARD_KEY, String(count + 1)); } catch(_) {}
        console.warn('[BOOT] Chunk load failed — refreshing once');
        // Synchronous redirect — no async cache clearing to avoid race conditions
        window.location.replace(window.location.pathname + '?cb=' + Date.now());
      }

      function showChunkRecovery() {
        if (document.getElementById('chunk-recovery')) return;
        var d = document.createElement('div');
        d.id = 'chunk-recovery';
        d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#fef3c7;border-bottom:1px solid #fbbf24;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:system-ui,sans-serif;font-size:13px;color:#92400e;';
        d.innerHTML = '<span>\uD83D\uDD04 New version available. Please refresh.</span><button onclick="sessionStorage.clear();window.location.replace(window.location.pathname)" style="background:#1a1a1a;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap">Refresh Now</button>';
        document.body.prepend(d);
      }

      // Expose the guard key globally so boot-diagnostics + build-version-guard
      // can check/increment the SAME counter instead of using their own keys.
      window.__RELOAD_GUARD_KEY__ = RELOAD_GUARD_KEY;
      window.__getReloadCount__ = getReloadCount;

      // Catch chunk failures via error event
      window.addEventListener('error', function(e) {
        if (isChunkFailure(e.message)) doChunkReload();
      });

      // Blank screen fallback after 4s — only if no reload already attempted
      setTimeout(function() {
        if (!window.__BOOT_OK__ && document.querySelectorAll('#root *').length === 0) {
          doChunkReload();
        }
      }, 4000);

      // Clear the reload guard on successful boot so future deploys can retry
      Object.defineProperty(window, '__BOOT_OK__', {
        set: function(v) {
          this.__boot_ok_val = v;
          if (v === true) {
            try { sessionStorage.removeItem(RELOAD_GUARD_KEY); } catch(_) {}
          }
        },
        get: function() { return this.__boot_ok_val; },
        configurable: true,
      });
      window.__BOOT_OK__ = false;

      // Fallback overlay — only after 10s for real fatal errors
      setTimeout(function() {
        if (!window.__BOOT_OK__) {
          var fatal = window.__BOOT_FATAL_ERRORS__;
          if (fatal && fatal.length >= 2) {
            console.warn('[BOOT] Multiple errors detected — showing recovery option');
            showChunkRecovery();
          }
        }
      }, 10000);
    </script>

    <!-- ═══════════════════════════════════════════════════════════════════
         PRE-HYDRATION CANONICAL + ROBOTS INJECTION
         Runs synchronously BEFORE React mounts. Ensures JS-executing
         crawlers (Googlebot, Bingbot, Pinterestbot in JS mode) see the
         correct PER-ROUTE canonical URL in the head BEFORE React hydrates.

         The canonical tag intentionally ships with NO static href so that
         non-JS crawlers (Pinterestbot, Facebook crawler) never receive a
         wrong (homepage) canonical for a deep route — they fall back to
         the request URL as the canonical, keeping per-PDP dedupe correct.
         ═══════════════════════════════════════════════════════════════════ -->
    <link rel="canonical" id="gp-canonical" />
    <script>
    (function(){
      var ORIGIN = 'https://getpawsy.pet';
      var p = location.pathname;
      // Tracking params that MUST be stripped from canonical URL generation.
      // Pinterest dedupes on canonical → including pin_id/utm_* would split
      // every pin into its own bucket and break attribution rollups.
      var STRIP_PARAMS = /^(pin_id|ref|gclid|fbclid|msclkid|mc_cid|mc_eid|igshid|yclid|utm_.*)$/i;

      // Normalize: lowercase, collapse double slashes, strip trailing slash
      p = p.replace(/\/{2,}/g, '/').toLowerCase();
      if (p.length > 1 && p.charAt(p.length - 1) === '/') p = p.replace(/\/+$/, '');

      // Build canonical from PATHNAME ONLY — query string is intentionally
      // discarded so pin_id, utm_*, ref, gclid etc. never leak in.
      var canonical = p === '/' || p === '' ? ORIGIN + '/' : ORIGIN + p;

      // Set canonical link
      var el = document.getElementById('gp-canonical');
      if (el) el.setAttribute('href', canonical);

      // Expose the strip-params regex for the React canonical hook so a
      // single source of truth governs tracking-param removal.
      try { window.__GP_CANONICAL_STRIP__ = STRIP_PARAMS; } catch(_) {}

      // Sync hreflang tags to match canonical
      var hIds = ['gp-hreflang-en','gp-hreflang-en-us','gp-hreflang-default'];
      for (var h = 0; h < hIds.length; h++) {
        var hEl = document.getElementById(hIds[h]);
        if (hEl) hEl.setAttribute('href', canonical);
      }

      // NOINDEX prefixes — routes that must never be indexed
      var NI = ['/admin','/api','/private','/dashboard','/diagnostics','/cart','/checkout',
        '/account','/auth','/profile','/orders','/search','/wishlist','/payment-success',
        '/thank-you','/track','/my-claims','/unsubscribe','/newsletter-preferences',
        '/live-map','/install','/google-review','/slow-feeder-offer','/download-ads',
        '/technical-declaration','/appeal-response','/security','/privacy-policy-iframe',
        '/terms-iframe','/compliance','/merchant-fix-checklist','/landing'];

      var noindex = false;
      for (var i = 0; i < NI.length; i++) {
        if (p === NI[i] || p.indexOf(NI[i] + '/') === 0) { noindex = true; break; }
      }

      // Also noindex if on lovable.app
      if (location.hostname.indexOf('.lovable.app') !== -1) noindex = true;

      if (noindex) {
        var metas = document.querySelectorAll('meta[name="robots"], meta[name="googlebot"]');
        for (var j = 0; j < metas.length; j++) {
          metas[j].setAttribute('content', 'noindex, follow');
        }
      }

      // ═══════════════════════════════════════════════════════════════════
      // PRE-HYDRATION SOFT-404 RECOVERY (2026-07-19)
      // Root cause: pre-render shell shipped one static title/description for
      // every URL → Google fingerprinted 331 URLs as duplicates → mass Soft 404.
      // Fix: (a) neutral brand shell (above), (b) route-specific titles below,
      // (c) hard 404 signal for URL shapes we know are dead — so Google gets
      // an unambiguous status BEFORE React hydrates.
      // ═══════════════════════════════════════════════════════════════════

      // UUID slug shape used by legacy CJ product IDs — never a live PDP.
      var UUID_RE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;

      function markDead(reason) {
        var metas = document.querySelectorAll('meta[name="robots"], meta[name="googlebot"]');
        for (var k = 0; k < metas.length; k++) metas[k].setAttribute('content', 'noindex, nofollow');
        var pr = document.createElement('meta');
        pr.setAttribute('name', 'prerender-status-code');
        pr.setAttribute('content', '404');
        document.head.appendChild(pr);
        document.title = '404 — Page Not Found | GetPawsy';
        var dm = document.querySelector('meta[name="description"]');
        if (dm) dm.setAttribute('content', 'This page is no longer available on GetPawsy. Browse current pet products and guides.');
        try { window.__GP_DEAD_URL__ = reason; } catch(_) {}
      }

      // Dead URL prefixes that don't map to any React route (from GSC export).
      // Safety-validated dead prefixes (2026-07-19): none of these resolve to
      // a live React route. `/dogs` was REMOVED from this list because it is
      // an intentional 301 → /collections/dog (see App.tsx).
      var DEAD_PREFIXES = ['/c/','/pages/','/small-pets/','/api/'];
      var DEAD_EXACT = ['/partners','/new-arrivals','/accessories'];
      for (var dp = 0; dp < DEAD_PREFIXES.length; dp++) {
        if (p.indexOf(DEAD_PREFIXES[dp]) === 0) { markDead('dead-prefix:' + DEAD_PREFIXES[dp]); break; }
      }
      for (var de = 0; de < DEAD_EXACT.length; de++) {
        if (p === DEAD_EXACT[de]) { markDead('dead-exact:' + DEAD_EXACT[de]); break; }
      }

      // Product PDPs: /product/:slug and /products/:slug both exist as live
      // routes. UUID or cj_-prefixed slugs are legacy/dead ⇒ hard 404 signal.
      function isDeadProductSlug(s) {
        if (!s) return true;
        var bare = s.split('/')[0];
        if (UUID_RE.test(bare)) return true;
        if (bare.indexOf('cj_') === 0) return true;
        return false;
      }

      if (p.indexOf('/product/') === 0 || p.indexOf('/products/') === 0) {
        var prefix = p.indexOf('/products/') === 0 ? '/products/' : '/product/';
        var slug = p.replace(prefix, '');
        if (isDeadProductSlug(slug)) {
          markDead('dead-product-slug');
        } else {
          // Convert slug to readable name and set a UNIQUE title so this URL
          // is not fingerprinted as a duplicate of the shell.
          var productName = slug.replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
          if (productName.length > 80) productName = productName.substring(0, 77) + '...';
          document.title = productName + ' | GetPawsy';
          var descMetaP = document.querySelector('meta[name="description"]');
          if (descMetaP) descMetaP.setAttribute('content', 'Shop ' + productName + ' at GetPawsy. Premium pet product with fast US shipping and 30-day returns.');

          // Inject minimal JSON-LD skeleton
          var jsonLd = {
            '@context': 'https://schema.org',
            '@type': 'Product',
            '@id': ORIGIN + prefix + slug + '#product',
            'name': productName,
            'brand': { '@type': 'Brand', 'name': 'GetPawsy' },
            'url': ORIGIN + prefix + slug,
            'offers': {
              '@type': 'Offer',
              'url': ORIGIN + prefix + slug,
              'priceCurrency': 'USD',
              'availability': 'https://schema.org/InStock',
              'itemCondition': 'https://schema.org/NewCondition',
              'seller': { '@type': 'Organization', 'name': 'GetPawsy' }
            }
          };
          var ldScript = document.createElement('script');
          ldScript.type = 'application/ld+json';
          ldScript.id = 'gp-prehydration-jsonld';
          ldScript.textContent = JSON.stringify(jsonLd);
          document.head.appendChild(ldScript);
        }
      }

      // Guides / editorial / landing pages — set a route-specific title so
      // the pre-render is not duplicated across dozens of URLs.
      function slugToName(s) {
        var n = s.replace(/\/$/, '').replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); });
        return n.length > 80 ? n.substring(0, 77) + '...' : n;
      }
      var UNIQUE_PREFIXES = [
        { pfx: '/guides/', suf: ' Guide | GetPawsy' },
        { pfx: '/blog/',   suf: ' | GetPawsy Blog' },
        { pfx: '/lp/',     suf: ' | GetPawsy' },
        { pfx: '/landing/',suf: ' | GetPawsy' },
        { pfx: '/best-',   suf: ' | GetPawsy',   keepPrefix: true },
      ];
      for (var up = 0; up < UNIQUE_PREFIXES.length; up++) {
        var cfg = UNIQUE_PREFIXES[up];
        if (p.indexOf(cfg.pfx) === 0) {
          var raw = cfg.keepPrefix ? p.slice(1) : p.slice(cfg.pfx.length);
          if (raw) {
            document.title = slugToName(raw) + cfg.suf;
            var dmU = document.querySelector('meta[name="description"]');
            if (dmU) dmU.setAttribute('content', slugToName(raw) + ' — expert pet care guide from GetPawsy.');
          }
          break;
        }
      }

      // Legacy hard-coded /product/ handling kept for backwards compat callers
      // that referenced the old block by comment marker (no-op branch).
      if (false && p.indexOf('/product/') === 0) {
        var slugLegacy = p.replace('/product/', '');
        // Convert slug to readable name: "orthopedic-dog-bed" → "Orthopedic Dog Bed"
        void slugLegacy;
      }

      // Redirect /bestseller/:slug to /product/:slug (canonical URL consolidation)
      if (p.indexOf('/bestseller/') === 0) {
        var bSlug = p.replace('/bestseller/', '');
        window.location.replace(ORIGIN + '/product/' + bSlug);
      }
    })();
    </script>

    <!-- Preload LCP hero image — route-aware: homepage vs landing pages -->
    <script>
      (function(){
        var p = location.pathname;
        // Only preload hero images on homepage
        if (p === '/' || p === '') {
          var m = document.createElement('link');
          m.rel = 'preload'; m.as = 'image'; m.fetchPriority = 'high';
          m.href = '/hero/dog-training-hero-mobile.webp'; m.media = '(max-width: 768px)';
          document.head.appendChild(m);
          var d = document.createElement('link');
          d.rel = 'preload'; d.as = 'image'; d.fetchPriority = 'high';
          d.href = '/hero/dog-training-hero-desktop.webp'; d.media = '(min-width: 769px)';
          document.head.appendChild(d);
        }
        // /go (TikTok prelander) — preload the LCP candidate (demo video
        // poster) so the hero paints immediately on cold mobile Safari,
        // BEFORE React hydrates and mounts the <video>. The video file
        // itself is too large to preload; <video preload="metadata"> will
        // pick it up. Keeping CTA paint < 1 frame is the #1 lever to
        // recover the 0–2s bounce on TikTok cold traffic.
        if (p === '/go') {
          var goPoster = document.createElement('link');
          goPoster.rel = 'preload';
          goPoster.as = 'image';
          goPoster.fetchPriority = 'high';
          goPoster.href = '/videos/go-demo-poster.jpg';
          document.head.appendChild(goPoster);

        // PRE-HYDRATION: Set meaningful title for collection pages

       PRE-REACT TIMELINE TRACER
       Runs as an inline sync script so it captures timestamps BEFORE any
       JS bundle has downloaded or executed. Activate with ?lcpTrace=1.
       All times are relative to performance.timeOrigin (= navigationStart).
       ═══════════════════════════════════════════════════════════════════ -->
  <script>
    (function(){
      if (location.search.indexOf('lcpTrace=1') === -1 &&
          location.search.indexOf('lcpTrace=true') === -1) return;

      var t0 = performance.now(); // ms since navigationStart = timeOrigin

      // ── helper ──────────────────────────────────────────────────────
      function ms(label, ts) {
        var lcpWindow = ts <= 2000;
        var tag = lcpWindow ? '\uD83D\uDD34 [LCP-WINDOW]' : '\uD83D\uDFE2 [POST-LCP]';
        console.log(tag + ' ' + label + ' | T+' + Math.round(ts) + 'ms');
      }

      // ── Timestamp 1: this inline script executed ─────────────────────
      window.__lcpTrace = { headScriptAt: t0 };
      ms('HEAD_SCRIPT  | Inline tracer executing (= HTML parsed to <head> end)', t0);

      // ── Timestamp 2: DOMContentLoaded ────────────────────────────────
      window.addEventListener('DOMContentLoaded', function() {
        var ts = performance.now();
        window.__lcpTrace.domContentLoadedAt = ts;
        ms('DCL          | DOMContentLoaded fired', ts);
      });

      // ── Timestamp 3: window.load ─────────────────────────────────────
      window.addEventListener('load', function() {
        var ts = performance.now();
        window.__lcpTrace.windowLoadAt = ts;
        ms('WINDOW_LOAD  | All resources loaded (images, fonts, scripts)', ts);

        // ── Bundle sizes from Resource Timing API ─────────────────────
        try {
          var entries = performance.getEntriesByType('resource');
          var jsBundles = entries.filter(function(e) {
            return e.initiatorType === 'script' && e.name.indexOf('.js') > -1;
          });
          var totalEncoded = 0;
          var mainBundle = null;
          jsBundles.forEach(function(e) {
            var enc = e.encodedBodySize || 0;
            totalEncoded += enc;
            // The largest JS file is the main bundle
            if (!mainBundle || enc > (mainBundle.encodedBodySize || 0)) mainBundle = e;
          });
          console.log(
            '\uD83D\uDFE2 [POST-LCP] JS_BUNDLES | ' + jsBundles.length + ' scripts, total gzip ~' +
            Math.round(totalEncoded / 1024) + 'KB' +
            (mainBundle
              ? ' | Largest: ' + mainBundle.name.split('/').pop() + ' (' + Math.round((mainBundle.encodedBodySize || 0) / 1024) + 'KB gzip, ' + Math.round((mainBundle.decodedBodySize || 0) / 1024) + 'KB raw)'

          );
          // TTFB from navigation timing

            ms('TTFB         | Time to first byte', nav.responseStart);
            ms('HTML_RECV    | HTML fully received', nav.responseEnd);
            ms('DOM_PARSED   | DOM parsing complete', nav.domContentLoadedEventStart);
            ms('PARSE_END    | Document interactive', nav.domInteractive);
          }

      // === BOOT PROTECTION LAYER (vanilla JS, zero dependencies) ===
      // This runs even if the main bundle completely fails to load/execute.

      // 1) Ensure dataLayer exists for any gtag references (prevents TDZ)
      window.dataLayer = window.dataLayer || [];

      // 1a) Install a global gtag stub IMMEDIATELY so any consent / config
      //     calls made before the GA script finishes loading are queued
      //     correctly. Without this, early consent updates fell back to a
      //     malformed { event: 'consent_update', ... } payload that GA4
      //     does not recognize, which is why the consent rate showed 0%.
      //     When the gtag/js script later loads it will replace this stub
      //     and replay every queued call.
      if (typeof window.gtag !== 'function') {
        window.gtag = function gtag(){ window.dataLayer.push(arguments); };
        // Default consent state — denied until the cookie banner grants.
        // Mirrors src/lib/deferred-analytics.ts so the very first GA hit
        // already carries the correct consent signal.
        window.gtag('consent', 'default', {
          analytics_storage: 'denied',
          ad_storage: 'denied',
          ad_user_data: 'denied',
          ad_personalization: 'denied',
          wait_for_update: 500,
        });
      }

      // 2) One-shot SW cleanup — only runs if SWs exist (avoids pointless work every load)
      (function(){
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            if (regs.length) regs.forEach(function(r) { r.unregister(); });
          }).catch(function(){});
        }
      })();

      // 3) Error capture (handled by head script — removed duplicate)
      // 4) Hard reload
      var hrb=document.getElementById('hard-reload-btn');
      if(hrb)hrb.addEventListener('click',function(){try{if('caches'in window)caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});}catch(e){}window.location.href=window.location.pathname+'?cache_bust='+Date.now();});
      // 5) (copy-diag removed — banner is now minimal)
      // 6) Continue anyway button — dismisses overlay and lets content show
      var cab=document.getElementById('continue-anyway-btn');
      if(cab)cab.addEventListener('click',function(){var r=document.getElementById('boot-recovery');if(r)r.style.display='none';});

        if(!window.__BOOT_OK__&&window.__BOOT_FATAL_ERRORS__&&window.__BOOT_FATAL_ERRORS__.length>=2){
