      img { content-visibility: auto; }

  <body>
    <div id="root">
      <!-- Recovery UI: visible only if React fails to mount -->
      <div id="boot-recovery" style="align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;padding:24px">
        <div style="text-align:center;max-width:440px">
          <div style="font-size:48px;margin-bottom:16px">🐾</div>
          <h1 style="font-size:22px;font-weight:600;margin-bottom:8px;color:#1a1a1a">GetPawsy needs a refresh</h1>
          <p style="font-size:14px;color:#666;margin-bottom:20px;line-height:1.5">
            A new version is available or a temporary issue occurred. Click below to fix it automatically.
          </p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px">
            <button onclick="location.reload()" style="padding:10px 24px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:14px;cursor:pointer;font-weight:500">
              Reload
            </button>
            <button id="hard-reload-btn" style="padding:10px 24px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#333;font-size:14px;cursor:pointer;font-weight:500">
              Hard Reload (clear cache)
            </button>
          </div>
          <button id="copy-diag-btn" style="padding:6px 16px;border-radius:6px;border:1px solid #eee;background:#f9f9f9;color:#888;font-size:12px;cursor:pointer;margin-bottom:8px">
            Copy diagnostics
          </button>
          <p id="boot-error-msg" style="font-size:11px;color:#bbb;margin-top:8px;word-break:break-all"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // === BOOT PROTECTION LAYER (vanilla JS, zero dependencies) ===
      // This runs even if the main bundle completely fails to load/execute.

      // 1) Ensure dataLayer exists for any gtag references (prevents TDZ)
      window.dataLayer = window.dataLayer || [];

      // 2) Unregister ALL service workers + clear caches on every load
      (function(){
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          }).catch(function(){});
        }
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
          }).catch(function(){});
        }
      })();

      // 3) Capture ALL boot errors with full stack traces
      window.__bootErrors = [];
      window.__bootStacks = [];
      window.addEventListener('error', function(e) {
        var info = {
          message: e.message || 'Unknown error',
          filename: e.filename || '',
          lineno: e.lineno || 0,
          colno: e.colno || 0,
          stack: e.error && e.error.stack ? e.error.stack : '',
          timestamp: new Date().toISOString()
        };
        window.__bootErrors.push(info);
        console.error('[BOOT_FAIL]', info.message, 'at', info.filename + ':' + info.lineno + ':' + info.colno);
        if (info.stack) console.error('[BOOT_FAIL] Stack:', info.stack);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        var info = {
          message: reason && reason.message ? reason.message : String(reason),
          stack: reason && reason.stack ? reason.stack : '',
          timestamp: new Date().toISOString()
        };
        window.__bootErrors.push(info);
        console.error('[BOOT_FAIL] Unhandled rejection:', info.message);
        if (info.stack) console.error('[BOOT_FAIL] Stack:', info.stack);
      });

      // 4) Hard reload button handler
      document.getElementById('hard-reload-btn').addEventListener('click', function() {
        try {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            });
          }
          sessionStorage.clear();
          // Best-effort clear IndexedDB
          if (window.indexedDB && indexedDB.databases) {
            indexedDB.databases().then(function(dbs) {
              dbs.forEach(function(db) { if (db.name) indexedDB.deleteDatabase(db.name); });
            }).catch(function(){});
          }
        } catch(e) {}
        window.location.href = window.location.pathname + '?cache_bust=' + Date.now();
      });

      // 5) Copy diagnostics button — captures FULL error context
      document.getElementById('copy-diag-btn').addEventListener('click', function() {
        var scripts = [];
        try {
          var scriptEls = document.querySelectorAll('script[src]');
          for (var i = 0; i < scriptEls.length; i++) scripts.push(scriptEls[i].src);
        } catch(e) {}

        var diag = {
          url: location.href,
          userAgent: navigator.userAgent,
          timestamp: new Date().toISOString(),
          bootErrors: window.__bootErrors || [],
          loadedScripts: scripts,
          swControlled: !!(navigator.serviceWorker && navigator.serviceWorker.controller),
          onLine: navigator.onLine,
          platform: navigator.platform || 'unknown',
          viewport: window.innerWidth + 'x' + window.innerHeight,
          devicePixelRatio: window.devicePixelRatio || 1,
          language: navigator.language || 'unknown'
        };
        try {
          navigator.clipboard.writeText(JSON.stringify(diag, null, 2));
          this.textContent = 'Copied!';
        } catch(e) {
          this.textContent = 'Copy failed';
        }
      });

      // 6) Boot watchdog: if React hasn't mounted within 8s, show recovery UI
      (function(){
        var t = setTimeout(function(){
          var root = document.getElementById('root');
          var recovery = document.getElementById('boot-recovery');
          if (root && recovery && root.children.length <= 1) {
            recovery.className = 'active';
            var errMsg = document.getElementById('boot-error-msg');
            if (errMsg && window.__bootErrors && window.__bootErrors.length > 0) {
              var lastErr = window.__bootErrors[window.__bootErrors.length - 1];
              var msg = lastErr.message || 'Unknown boot error';
              if (lastErr.filename) msg += ' at ' + lastErr.filename.split('/').pop() + ':' + lastErr.lineno;
              if (lastErr.stack) msg += '\n' + lastErr.stack.substring(0, 300);
              errMsg.textContent = msg;
            }
            console.error('[BOOT_FAIL] React did not mount within 8 seconds. Errors:', window.__bootErrors);
          }
        }, 8000);
        
        var obs = new MutationObserver(function(){
          var recovery = document.getElementById('boot-recovery');
          if (!recovery) { clearTimeout(t); obs.disconnect(); }
        });
        if (document.getElementById('root')) {
          obs.observe(document.getElementById('root'), { childList: true });
        }
      })();

      // 7) Boot debug mode: ?bootdebug=1 shows diagnostics even if app loads
      (function(){
        if (location.search.indexOf('bootdebug=1') === -1) return;
        window.__bootdebugActive = true;
        // Show diagnostics after a delay to let app mount
        setTimeout(function(){
          var panel = document.createElement('div');
          panel.style.cssText = 'position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.9);color:#0f0;padding:16px;font-family:monospace;font-size:11px;z-index:99999;border-radius:8px;max-width:400px;max-height:60vh;overflow:auto;pointer-events:auto';
          var scripts = [];
          try { var s = document.querySelectorAll('script[src]'); for(var i=0;i<s.length;i++) scripts.push(s[i].src); } catch(e){}
          var info = {
            mode: 'boot-debug',
            url: location.href,
            ua: navigator.userAgent,
            errors: window.__bootErrors || [],
            scripts: scripts,
            swControlled: !!(navigator.serviceWorker && navigator.serviceWorker.controller),
            reactMounted: !document.getElementById('boot-recovery'),
            timestamp: new Date().toISOString()
          };
          panel.innerHTML = '<b>[Boot Debug]</b><br><pre style="white-space:pre-wrap;word-break:break-all">' + JSON.stringify(info, null, 2) + '</pre>';
          var copyBtn = document.createElement('button');
          copyBtn.textContent = 'Copy';
          copyBtn.style.cssText = 'margin-top:8px;padding:4px 12px;background:#333;color:#fff;border:1px solid #666;cursor:pointer';
          copyBtn.onclick = function(){ navigator.clipboard.writeText(JSON.stringify(info,null,2)); copyBtn.textContent='Copied!'; };
          panel.appendChild(copyBtn);
          document.body.appendChild(panel);
        }, 3000);
      })();
    </script>
  </body>
