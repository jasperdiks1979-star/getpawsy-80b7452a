worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # NOTE: www → apex redirect is handled by the Lovable hosting edge (Cloudflare)
    # BEFORE requests reach this nginx. That edge returns 302 (platform constraint).
    # The nginx rule below is kept as a safety-net fallback only — it will NOT fire
    # under normal conditions because the edge intercepts first.
    # Verified 2026-02-17 via server-side header checks: all www URLs get 302 from
    # server=cloudflare with Domain=lovable.app cookies, confirming edge-level redirect.
    server {
        listen 80;
        listen [::]:80;
        server_name www.getpawsy.pet ~^.*\.lovable\.app$;
        return 301 https://getpawsy.pet$request_uri;
        add_header X-Redirect-Reason "www-to-apex" always;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name getpawsy.pet _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Sitemap XML static files - serve from disk, NOT SPA fallback
        location = /sitemap.xml {
            try_files $uri =404;
            default_type "text/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Robots-Tag "noindex" always;
        }

        location = /sitemap_index.xml {
            try_files $uri =404;
            default_type "text/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # All other sitemap-*.xml files
        location ~ ^/sitemap-.*\.xml$ {
            try_files $uri =404;
            default_type "text/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Vite hashed assets — immutable long cache
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # Other static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # robots.txt handler
        location = /robots.txt {
            try_files $uri =404;
            add_header Content-Type text/plain;
        }

        # Merchant feed XML - static file from build
        location = /merchant-feed.xml {
            try_files $uri =404;
            default_type "text/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Merchant diagnostics XML - static file from build
        location = /merchant-diagnostics.xml {
            try_files $uri =404;
            default_type "text/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Strip trailing slashes with 301 redirect (except root)
        rewrite ^(.+)/$ $1 permanent;

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
            
            # HTML: always revalidate but allow CDN/browser to cache briefly
            add_header Cache-Control "public, max-age=0, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # API proxy (if needed - configure your API endpoint)
        # location /api/ {
        #     proxy_pass https://your-api-endpoint.com/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
