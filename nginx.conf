worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Sitemap XML proxy - same-origin GSC workaround
        # Maps /sitemap*.xml to supabase edge function type parameter
        location ~ ^/sitemap.*\.xml$ {
            # Map URI to type parameter
            set $sitemap_type "index";
            if ($uri = "/sitemap.xml") { set $sitemap_type "index"; }
            if ($uri = "/sitemap-guides.xml") { set $sitemap_type "guides"; }
            if ($uri = "/sitemap-products.xml") { set $sitemap_type "products"; }
            if ($uri = "/sitemap-collections.xml") { set $sitemap_type "collections"; }
            if ($uri = "/sitemap-blog.xml") { set $sitemap_type "blog"; }
            if ($uri = "/sitemap-static.xml") { set $sitemap_type "static"; }
            if ($uri = "/sitemap-bestsellers.xml") { set $sitemap_type "bestsellers"; }

            # Proxy to supabase edge function
            proxy_pass https://nojvgfbcjgipjxpfatmm.supabase.co/functions/v1/sitemap-xml?type=$sitemap_type;
            proxy_ssl_verify off;
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;

            # Override response headers to same-origin
            add_header Content-Type "application/xml; charset=utf-8" always;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            
            # Remove problematic upstream headers
            proxy_ignore_headers Cache-Control;
            proxy_hide_header Cache-Control;
            proxy_hide_header Pragma;

            access_log /var/log/nginx/sitemap.log main;
        }

        # Static assets with long cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
            
            # Cache control for HTML
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # API proxy (if needed - configure your API endpoint)
        # location /api/ {
        #     proxy_pass https://your-api-endpoint.com/;
        #     proxy_http_version 1.1;
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection 'upgrade';
        #     proxy_set_header Host $host;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
